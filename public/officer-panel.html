<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officer Panel | PS-CRM</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .gov-bg {
            background-color: #f8fafc;
        }

        .gov-header {
            background-color: #0f172a;
        }
    </style>
</head>

<body class="gov-bg text-slate-800 flex flex-col min-h-screen">

    <!-- Header -->
    <header class="gov-header text-white shadow-md relative z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center">
                <i class="fas fa-user-shield text-yellow-400 text-2xl mr-3"></i>
                <span class="font-bold text-xl tracking-wide">Officer Assignment Panel</span>
            </div>
            <div class="flex items-center gap-4 text-sm">
                <span class="text-gray-300 hidden sm:inline"><i class="fas fa-user-circle"></i> Logged in as Dept Nodal
                    Officer</span>
                <a href="index.html"
                    class="bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded text-white transition">Logout</a>
            </div>
        </div>
    </header>

    <main class="flex-grow py-8 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto w-full">

        <div class="flex justify-between items-end mb-6">
            <div>
                <h2 class="text-2xl font-bold text-gray-800">Assigned Grievances</h2>
                <p class="text-sm text-gray-500 mt-1">Update status and manage your department's workload.</p>
            </div>
            <button onclick="fetchComplaints()"
                class="bg-blue-100 text-blue-700 px-4 py-2 rounded-lg font-medium hover:bg-blue-200 transition text-sm">
                <i class="fas fa-sync-alt mr-2"></i>Refresh List
            </button>
        </div>

        <!-- Complaints List -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="complaintsList">
            <!-- Populated via JS -->
            <div class="col-span-full text-center py-10 text-gray-500">
                <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
                <p>Loading assigned grievances...</p>
            </div>
        </div>
    </main>

    <!-- Update Status Modal -->
    <div id="statusModal"
        class="fixed inset-0 bg-gray-900 bg-opacity-75 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl max-w-md w-full overflow-hidden transform transition-all">
            <div class="bg-gray-50 border-b border-gray-200 px-6 py-4 flex justify-between items-center">
                <h3 class="text-lg font-bold text-gray-800">Update Status</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><i
                        class="fas fa-times text-xl"></i></button>
            </div>
            <div class="px-6 py-6">
                <p class="text-sm text-gray-500 mb-4">Complaint ID: <strong id="modalId"
                        class="text-gray-800 font-mono"></strong></p>

                <form id="statusForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">New Status</label>
                        <select id="newStatus"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none bg-white">
                            <option value="Assigned">Assigned (Pending Review)</option>
                            <option value="In Progress">Work In Progress</option>
                            <option value="Resolved">Resolved & Closed</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Upload Resolution Photo
                            (Optional)</label>
                        <input type="file"
                            class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 border border-gray-300 rounded-lg p-1 bg-white">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Action Remarks</label>
                        <textarea rows="3"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none bg-white font-mono text-sm"
                            placeholder="Work done..."></textarea>
                    </div>
                    <div class="pt-4 flex gap-3 justify-end border-t border-gray-100 mt-6">
                        <button type="button" onclick="closeModal()"
                            class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg font-medium transition">Cancel</button>
                        <button type="submit" id="saveStatusBtn"
                            class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium shadow-sm transition">Save
                            Update</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        let currentComplaintId = null;

        async function fetchComplaints() {
            try {
                const apiUrl = window.location.protocol === 'file:'
                    ? 'http://localhost:3000/api/officer/complaints'
                    : '/api/officer/complaints';
                const res = await fetch(apiUrl);
                if (!res.ok) throw new Error("Server error");
                const complaints = await res.json();

                const list = document.getElementById('complaintsList');
                list.innerHTML = '';

                if (complaints.length === 0) {
                    list.innerHTML = '<div class="col-span-full text-center py-10 text-gray-500">No complaints assigned to you.</div>';
                    return;
                }

                complaints.forEach(c => {
                    const deadlineDate = new Date(c.resolutionDeadline);
                    const isDelayed = deadlineDate < new Date() && c.status !== 'Resolved';

                    let bgStatus = "bg-gray-100 text-gray-800";
                    if (c.status === 'Resolved') bgStatus = "bg-green-100 text-green-800";
                    else if (c.status === 'In Progress') bgStatus = "bg-blue-100 text-blue-800";
                    else if (c.status === 'Assigned') bgStatus = "bg-yellow-100 text-yellow-800";

                    // Create Card
                    list.innerHTML += `
                        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col transition hover:shadow-md ${isDelayed ? 'border-l-4 border-l-red-500' : ''}">
                            <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-start bg-gray-50">
                                <div>
                                    <h3 class="font-bold text-gray-800 font-mono">${c.id}</h3>
                                    <p class="text-xs text-gray-500 mt-1"><i class="fas fa-tag mr-1 text-gray-400"></i>${c.category}</p>
                                </div>
                                <span class="px-2 py-1 inline-flex text-xs leading-5 font-bold rounded-md border shadow-sm ${bgStatus}">
                                  ${c.status}
                                </span>
                            </div>
                            
                            <div class="px-5 py-4 flex-grow">
                                <div class="mb-4">
                                    <p class="text-xs font-semibold text-gray-500 uppercase flex items-center mb-1">
                                        <i class="fas fa-map-marker-alt text-red-400 mr-1"></i> Location
                                    </p>
                                    <p class="text-sm text-gray-800">${c.location}</p>
                                </div>
                                <div class="mb-4">
                                    <p class="text-xs font-semibold text-gray-500 uppercase flex items-center mb-1">
                                        <i class="fas fa-align-left text-blue-400 mr-1"></i> Description
                                    </p>
                                    <p class="text-sm text-gray-600 line-clamp-3 bg-gray-50 p-2 rounded border border-gray-100 italic">"${c.description}"</p>
                                </div>
                                
                                <div class="flex justify-between items-center text-xs mt-4 pt-4 border-t border-gray-100">
                                    <div>
                                        <p class="text-gray-500 mb-1">SLA Deadline</p>
                                        <p class="font-bold ${isDelayed ? 'text-red-500' : 'text-gray-800'}">${deadlineDate.toLocaleDateString()}</p>
                                    </div>
                                    <div>
                                        <p class="text-gray-500 mb-1">Filed On</p>
                                        <p class="font-medium text-gray-800">${new Date(c.filedAt).toLocaleDateString()}</p>
                                    </div>
                                </div>
                            </div>

                            <div class="px-5 py-3 bg-gray-50 border-t border-gray-200 flex justify-between items-center">
                                <button onclick="openModal('${c.id}', '${c.status}')" ${c.status === 'Resolved' ? 'disabled' : ''} class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white text-sm font-bold py-2 px-4 rounded-lg transition shadow-sm flex items-center justify-center">
                                    ${c.status === 'Resolved' ? '<i class="fas fa-check-circle mr-2"></i> Closed' : '<i class="fas fa-pencil-alt mr-2"></i> Update Action'}
                                </button>
                            </div>
                        </div>
                    `;
                });

            } catch (err) {
                console.error("Failed to load list", err);
            }
        }

        function openModal(id, currentStatus) {
            currentComplaintId = id;
            document.getElementById('modalId').textContent = id;
            document.getElementById('newStatus').value = currentStatus;
            document.getElementById('statusModal').classList.remove('hidden');
        }

        function closeModal() {
            currentComplaintId = null;
            document.getElementById('statusModal').classList.add('hidden');
            document.getElementById('statusForm').reset();
        }

        document.getElementById('statusForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveStatusBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            const newStatus = document.getElementById('newStatus').value;

            try {
                const apiUrl = window.location.protocol === 'file:'
                    ? `http://localhost:3000/api/officer/complaints/${currentComplaintId}/status`
                    : `/api/officer/complaints/${currentComplaintId}/status`;
                const res = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });

                if (res.ok) {
                    closeModal();
                    fetchComplaints(); // refresh list
                } else {
                    alert('Update failed');
                }
            } catch (err) {
                alert('Network error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Save Update';
            }
        });

        // initial load
        document.addEventListener('DOMContentLoaded', fetchComplaints);
    </script>
</body>

</html>
