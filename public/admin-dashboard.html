<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | PS-CRM</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .gov-bg {
            background-color: #f1f5f9;
        }

        .gov-sidebar {
            background-color: #0f172a;
        }
    </style>
</head>

<body class="gov-bg text-slate-800 flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar"
        class="w-64 gov-sidebar text-white flex-shrink-0 flex flex-col transition-all duration-300 transform md:translate-x-0 -translate-x-full fixed md:relative z-20 h-full">
        <div class="h-16 flex items-center px-6 border-b border-gray-800 bg-gray-900">
            <span class="font-bold text-xl tracking-wide text-yellow-400"><i class="fas fa-shield-alt mr-2"></i> PS-CRM
                Admin</span>
        </div>
        <div class="flex-1 overflow-y-auto py-4">
            <nav class="space-y-1 px-3">
                <a href="#"
                    class="bg-blue-800 text-white group flex items-center px-3 py-2 text-sm font-medium rounded-md">
                    <i class="fas fa-chart-pie w-6"></i> Dashboard
                </a>
                <a href="officer-panel.html"
                    class="text-gray-300 hover:bg-gray-800 hover:text-white group flex items-center px-3 py-2 text-sm font-medium rounded-md">
                    <i class="fas fa-users-cog w-6"></i> Officer Panel
                </a>
                <a href="index.html"
                    class="text-gray-300 hover:bg-gray-800 hover:text-white group flex items-center px-3 py-2 text-sm font-medium rounded-md">
                    <i class="fas fa-external-link-alt w-6"></i> Public Portal
                </a>
            </nav>
        </div>
        <div class="p-4 border-t border-gray-800 text-xs text-gray-500 text-center">
            Gov IT Admin HQ
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto w-full md:w-auto">
        <header
            class="bg-white shadow-sm h-16 flex items-center justify-between px-4 sm:px-6 lg:px-8 border-b border-gray-200">
            <div class="flex items-center">
                <button onclick="document.getElementById('sidebar').classList.toggle('-translate-x-full')"
                    class="md:hidden text-gray-500 hover:text-gray-700 p-2"><i class="fas fa-bars"></i></button>
                <h1 class="text-xl font-bold text-gray-800 ml-2">Command Center Overview</h1>
            </div>
            <div class="flex items-center gap-4">
                <div
                    class="flex items-center bg-green-100 text-green-800 px-3 py-1 rounded-full text-xs font-bold border border-green-200">
                    <span class="w-2 h-2 bg-green-500 rounded-full mr-2 animate-pulse"></span> SYSTEM ONLINE
                </div>
            </div>
        </header>

        <div class="p-4 sm:p-6 lg:p-8">

            <!-- KPIs -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div
                    class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center hover:shadow-md transition">
                    <div class="p-3 bg-blue-100 text-blue-600 rounded-lg text-2xl"><i class="fas fa-folder-open"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm font-medium text-gray-500">Total Complaints</p>
                        <p class="text-3xl font-bold text-gray-800" id="totalCount">0</p>
                    </div>
                </div>
                <div
                    class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center hover:shadow-md transition">
                    <div class="p-3 bg-yellow-100 text-yellow-600 rounded-lg text-2xl"><i class="fas fa-clock"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm font-medium text-gray-500">Pending Actions</p>
                        <p class="text-3xl font-bold text-gray-800" id="pendingCount">0</p>
                    </div>
                </div>
                <div
                    class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center hover:shadow-md transition">
                    <div class="p-3 bg-green-100 text-green-600 rounded-lg text-2xl"><i class="fas fa-check-circle"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm font-medium text-gray-500">Resolved</p>
                        <p class="text-3xl font-bold text-gray-800" id="resolvedCount">0</p>
                    </div>
                </div>
            </div>

            <!-- Charts -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                <!-- Dept Chart -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                    <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Department-wise Load</h3>
                    <div class="relative h-64 w-full">
                        <canvas id="deptChart"></canvas>
                    </div>
                </div>

                <!-- Area Chart -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                    <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Area-wise Distribution</h3>
                    <div class="relative h-64 w-full">
                        <canvas id="areaChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Recent Activity Table -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                    <h3 class="text-lg font-bold text-gray-800">SLA Tracking & Recent Logs</h3>
                    <button onclick="fetchStats()" class="text-sm text-blue-600 hover:text-blue-800"><i
                            class="fas fa-sync-alt mr-1"></i> Refresh</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    ID</th>
                                <th
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Department</th>
                                <th
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Status</th>
                                <th
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Deadline</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="bg-white divide-y divide-gray-200">
                            <!-- Populated via JS -->
                            <tr>
                                <td colspan="4" class="px-6 py-4 text-center text-sm text-gray-500">Loading data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script>
        let dChartInstance = null;
        let aChartInstance = null;

        async function fetchStats() {
            try {
                const apiUrl = window.location.protocol === 'file:'
                    ? 'http://localhost:3000/api/admin/stats'
                    : '/api/admin/stats';
                const res = await fetch(apiUrl);
                if (!res.ok) throw new Error("Server error");
                const data = await res.json();

                // Update KPIs
                document.getElementById('totalCount').textContent = data.total;
                document.getElementById('pendingCount').textContent = data.pending;
                document.getElementById('resolvedCount').textContent = data.resolved;

                // Update Charts
                const dLabels = Object.keys(data.byDepartment);
                const dVals = Object.values(data.byDepartment);

                const aLabels = Object.keys(data.byArea);
                const aVals = Object.values(data.byArea);

                if (dChartInstance) dChartInstance.destroy();
                if (aChartInstance) aChartInstance.destroy();

                const ctxD = document.getElementById('deptChart').getContext('2d');
                dChartInstance = new Chart(ctxD, {
                    type: 'doughnut',
                    data: {
                        labels: dLabels,
                        datasets: [{
                            data: dVals,
                            backgroundColor: ['#3b82f6', '#eab308', '#22c55e', '#ef4444', '#6b7280', '#8b5cf6'],
                            borderWidth: 0
                        }]
                    },
                    options: { maintainAspectRatio: false }
                });

                const ctxA = document.getElementById('areaChart').getContext('2d');
                aChartInstance = new Chart(ctxA, {
                    type: 'bar',
                    data: {
                        labels: aLabels,
                        datasets: [{
                            label: 'Issues',
                            data: aVals,
                            backgroundColor: '#3b82f6',
                            borderRadius: 4
                        }]
                    },
                    options: {
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } }
                    }
                });

                // Update Table
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';

                // sort by SLA limit
                const complaints = data.allComplaints.sort((a, b) => new Date(a.resolutionDeadline) - new Date(b.resolutionDeadline));

                complaints.slice(0, 10).forEach(c => {
                    const deadlineDate = new Date(c.resolutionDeadline);
                    const isDelayed = deadlineDate < new Date() && c.status !== 'Resolved';

                    let bgStatus = "bg-gray-100 text-gray-800";
                    if (c.status === 'Resolved') bgStatus = "bg-green-100 text-green-800";
                    else if (c.status === 'In Progress') bgStatus = "bg-blue-100 text-blue-800";
                    else if (c.status === 'Assigned') bgStatus = "bg-yellow-100 text-yellow-800";

                    tbody.innerHTML += `
                        <tr class="hover:bg-gray-50 transition">
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-gray-800">${c.id}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${c.department}</td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full ${bgStatus}">
                                  ${c.status}
                                </span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium ${isDelayed ? 'text-red-600' : 'text-gray-500'}">
                                ${deadlineDate.toLocaleDateString()} ${isDelayed ? '<i class="fas fa-exclamation-circle ml-1" title="SLA Breached"></i>' : ''}
                            </td>
                        </tr>
                    `;
                });

            } catch (err) {
                console.error("Dashboard failed to load", err);
            }
        }

        // Init
        document.addEventListener('DOMContentLoaded', fetchStats);
    </script>
</body>

</html>
